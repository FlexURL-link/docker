services:
  flexurl:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - flexurl-data:/app/data
    environment:
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-*}
    restart: unless-stopped

volumes:
  flexurl-data:
